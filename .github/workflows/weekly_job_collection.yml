name: Weekly Job Pipeline + Dashboard Deploy

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/71023542519/locations/global/workloadIdentityPools/github-pool/providers/github-provider-v2'
          service_account: 'github-pipeline@project-bf62429c-050a-4ead-b92.iam.gserviceaccount.com'
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Install Python dependencies
        run: |
          pip install papermill pandas openpyxl requests beautifulsoup4 tqdm jupyter nbconvert google-auth google-auth-oauthlib google-api-python-client plotly ipywidgets ipyvuetify kaleido reportlab voila anywidget
      - name: Execute notebook
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_KEY:   ${{ secrets.USAJOBS_KEY }}
          JOOBLE_KEY:    ${{ secrets.JOOBLE_KEY }}
        run: |
          mkdir -p job_outputs
          papermill "CS_MBA_AI_USAJobs_Jooble_Master_Combiner_v3_Dashboard.ipynb" ./executed_notebook.ipynb --log-output --no-progress-bar -p DRIVE_BASE job_outputs
      - name: Generate Static HTML for GitHub Pages
        run: |
          jupyter nbconvert --to html --template classic --no-input executed_notebook.ipynb --output index.html
      - name: Upload master files to Google Drive
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python upload_to_drive.py
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-${{ github.run_id }}
          files: job_outputs/outputs/MASTER_*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
          keep_files: true
